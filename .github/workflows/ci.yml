name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Runtime tests
        run: npm run test:runtime

      - name: Build UI
        run: npm run build:ui

      - name: Upload UI artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist
          if-no-files-found: error
