name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Runtime tests
        run: npm run test:runtime

      - name: Build UI
        run: npm run build:ui

      - name: Upload UI artifact
        if: success() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ui-dist
          path: apps/ui/dist
          if-no-files-found: error

  package:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: npm run package:linux
          - os: windows-latest
            command: npm run package:win
          - os: macos-latest
            command: npm run package:mac
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Package app
        run: ${{ matrix.command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: desktop-${{ matrix.os }}
          path: release/**/*
          if-no-files-found: error
